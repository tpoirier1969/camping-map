<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#133b2c">
  <title>Camping Map</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="https://cdn.maptiler.com/maptiler-sdk-js/latest/maptiler-sdk.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="appShell">
    <div id="map"></div>
    <div id="loadingOverlay" class="loading-overlay" hidden>
      <div class="loading-spinner" aria-hidden="true"></div>
      <div id="loadingText">Loading data…</div>
    </div>
    <div id="zoomReadout" aria-live="polite">Zoom: --</div>

    <button id="menuToggle" aria-label="Menu" title="Map options">☰</button>

    <aside id="menuPanel" class="is-open">
      <div class="panel-header">
        <div>
          <h1>Camping Map <span id="versionTag">v20.3</span></h1>
          <p id="statusText">Loading map data…</p>
          <p id="dataStats" class="note"></p>
        </div>
        <button id="closeMenu" class="ghost-button" aria-label="Close menu">✕</button>
      </div>

      <section class="panel-section">
        <h2>Find an area</h2>
        <label class="field-label" for="searchInput">Search place or coordinates</label>
        <div class="search-row">
          <input id="searchInput" name="search" type="text" placeholder="City, park, address, or lat, lng">
          <button id="searchBtn" class="ghost-button" type="button">Go</button>
        </div>
<p id="searchStatus" class="note" aria-live="polite"></p>
        <div id="searchResults" class="search-results" hidden></div>
      </section>

      <section class="panel-section">
        <h2>Basemap</h2>
        <label class="field-label" for="basemapSelect">Map style</label>
        <select id="basemapSelect" name="basemap">
          <option value="outdoor">Outdoor</option>
          <option value="satellite">Satellite</option>
          <option value="topo">Topo</option>
          <option value="osm">OpenStreetMap fallback</option>
        </select>
        <label class="switch-row"><input type="checkbox" id="toggleTerrain" name="terrain"> 3D terrain</label>
        <label class="switch-row"><input type="checkbox" id="togglePitch" name="pitch"> Tilt camera when 3D is on</label>
      </section>

      <section class="panel-section">
        <h2>Campsite layers</h2>
        <div id="layerToggleList" class="toggle-list"></div>
      </section>

      <section class="panel-section">
        <h2>Add a site</h2>
        <label class="switch-row"><input type="checkbox" id="toggleAddMode" name="addMode"> Tap map to drop a draft pin</label>
        <p class="note">Enable this and tap once, or long-press the map.</p>
      </section>

      <section class="panel-section" id="countsPanel">
        <h2>Visible counts</h2>
        <div id="countsGrid" class="counts-grid"></div>
      </section>

      <section class="panel-section">
        <h2>Display behavior</h2>
        <label class="switch-row"><input type="checkbox" id="toggleStateSummaries" name="stateSummaries" checked> State summary symbols when zoomed out</label>
        <label class="switch-row"><input type="checkbox" id="toggleSitePoints" name="sitePoints" checked> Individual campsite symbols when zoomed in</label>
        <div id="summaryLegendKey" class="summary-key" aria-label="Summary circle legend"></div>
      </section>

      <section class="panel-section key-section" id="keySection">
        <h2>Map engine</h2>
        <p class="note">Outdoor, Satellite, Topo, and 3D terrain need a MapTiler API key.</p>
        <label class="field-label" for="apiKeyInput">MapTiler API key</label>
        <div class="key-row">
          <input id="apiKeyInput" name="apiKey" type="password" placeholder="Paste key here">
          <button id="saveKeyBtn" class="ghost-button" type="button">Save</button>
          <button id="clearKeyBtn" class="ghost-button" type="button">Clear</button>
        </div>
      </section>
      <button id="revealKeySectionBtn" class="ghost-button" type="button" hidden>Map key saved — manage</button>
    </aside>
  </div>

  <script src="https://cdn.maptiler.com/maptiler-sdk-js/latest/maptiler-sdk.umd.min.js"></script>
  <script src="js/app-config-v20.3.js"></script>
  <script src="js/app-data-v20.3.js"></script>
  <script src="js/app-summaries-v20.3.js"></script>
  <script src="js/app-basemap-v20.3.js"></script>
  <script src="js/app-ui-v20.3.js"></script>
  <script src="js/app-main-v20.3.js"></script>
</body>
</html>
